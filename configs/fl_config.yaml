# Federated Learning Configuration
federated_learning:
  num_rounds: 10           # Communication rounds (increase to 50 for better accuracy)
  num_clients: 3           # 3 hospitals
  clients_per_round: 3     # All clients participate each round
  fraction_fit: 1.0        # Use all available clients
  fraction_evaluate: 1.0   # Evaluate on all clients
  
model:
  num_classes: 3
  learning_rate: 0.001
  batch_size: 32
  local_epochs: 5          # Each hospital trains for 5 epochs per round
  
privacy:
  use_differential_privacy: false  # We'll enable this later
  epsilon: 3.0
  delta: 1e-5
  noise_multiplier: 1.0
  
data:
  img_size: 224
  num_workers: 2
  
server:
  address: "localhost:8080"
  strategy: "fedavg"       # Federated Averaging